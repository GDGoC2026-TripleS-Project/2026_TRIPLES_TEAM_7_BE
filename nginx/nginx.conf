server {
    listen 80;
    server_name piec.store;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # return 301 https://$host$request_uri;
        proxy_pass http://node-app:8080;
    }
}